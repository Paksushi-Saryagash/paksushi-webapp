services:
  postgres:
    image: postgres:16-alpine
    container_name: pak-sushi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pak_sushi
    ports:
      - "5432:5432"
    volumes:
      - pak_sushi_pg:/var/lib/postgresql/data

volumes:
  pak_sushi_pg:
